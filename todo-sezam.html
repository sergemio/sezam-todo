<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sezam&Co — Action Board</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f2f5;--surface:#fff;--border:#e2e5ea;--text:#1a1a2e;--text2:#6b7280;
  --accent:#3b82f6;--red:#dc2626;--orange:#ea580c;--yellow:#ca8a04;--green:#16a34a;--purple:#9333ea;
  --font:'DM Sans',system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text)}
body{display:flex;flex-direction:column;overflow:hidden}

/* Top bar */
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
.topbar h1{font-size:1.1rem;font-weight:700;white-space:nowrap}
.stats{display:flex;gap:6px;flex:1;justify-content:center;flex-wrap:wrap}
.chip{font-size:.7rem;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap;cursor:pointer;transition:.15s}
.chip:hover{opacity:.7}
.chip-red{background:#fef2f2;color:var(--red)}
.chip-yellow{background:#fefce8;color:var(--yellow)}
.chip-blue{background:#eff6ff;color:var(--accent)}
.chip-green{background:#f0fdf4;color:var(--green)}
.btn{background:var(--surface);border:1px solid var(--border);padding:6px 14px;border-radius:8px;font-size:.78rem;font-family:var(--font);font-weight:500;cursor:pointer;transition:.15s;color:var(--text)}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#2563eb}
.toggle-view{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.toggle-view button{border:none;background:none;padding:6px 12px;font-size:.72rem;font-family:var(--font);font-weight:600;cursor:pointer;color:var(--text2);transition:.15s}
.toggle-view button.active{background:var(--accent);color:#fff}

/* Board */
.board{display:flex;gap:14px;padding:16px 20px;overflow-x:auto;flex:1;align-items:flex-start}
.board::-webkit-scrollbar{height:8px}
.board::-webkit-scrollbar-track{background:transparent}
.board::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}

/* Column */
.column{background:var(--surface);border:1px solid var(--border);border-radius:12px;min-width:280px;max-width:320px;flex-shrink:0;display:flex;flex-direction:column;max-height:100%;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.col-header{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.col-icon{font-size:1rem}
.col-title{font-size:.85rem;font-weight:700;flex:1}
.col-count{background:var(--bg);color:var(--text2);font-size:.68rem;font-weight:600;padding:2px 8px;border-radius:10px}
.col-add{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--text2);padding:2px 6px;border-radius:6px;transition:.15s}
.col-add:hover{background:var(--bg);color:var(--accent)}
.col-cards{padding:8px;overflow-y:auto;flex:1}
.col-cards::-webkit-scrollbar{width:4px}
.col-cards::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}

/* Card */
.card{background:var(--bg);border:1px solid transparent;border-radius:8px;cursor:grab;transition:.15s;position:relative;padding:12px 16px 12px 12px;-webkit-user-select:none;user-select:none}
.card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(59,130,246,.08)}
.card.dragging{opacity:.4;transform:rotate(2deg)}
.card-ghost{position:fixed;pointer-events:none;z-index:200;opacity:.85;transform:rotate(2deg);box-shadow:0 8px 24px rgba(0,0,0,.15);transition:none}
.drop-placeholder{border:2px dashed var(--accent);border-radius:8px;background:rgba(59,130,246,.12);transition:height .15s;margin:10px 0;min-height:52px}
.col-cards .card{transition:transform .25s cubic-bezier(.2,.8,.3,1),box-shadow .25s ease}
.col-cards .card.push-down{transform:translateY(12px)}
.col-cards .card.push-up{transform:translateY(-12px)}
.card-routine-due{background:#ededff !important}
.card-routine-due .card-title::before{content:'🔄 ';font-size:.7rem}
.card-next-due{font-size:.65rem;color:var(--text2);margin-top:4px;font-style:italic}
.card-next-due.overdue{color:#dc2626;font-style:normal;font-weight:600}
.tag-age{background:#ececf0;color:#6b7280}
.card-faded-30{opacity:.72}
.card-faded-60{opacity:.48}
.card-faded-30:hover,.card-faded-60:hover{opacity:1}
.card-snoozed{opacity:.55;background:#f3f4f8}
.card-woken{background:#fff7e6}
.mobile-card.card-faded-30{opacity:.72}
.mobile-card.card-faded-60{opacity:.48}
.mobile-card.card-snoozed{opacity:.55}
.mobile-card.card-woken{background:#fff7e6}

/* --- Focus du jour --- */
/* 3 zones fixes : head (date+progress) / card-zone (carte centree) / actions+foot pinned bas.
   Les boutons gardent une position constante quelle que soit la taille de la carte. */
.jour-view{display:flex;flex-direction:column;height:100%;padding:18px 16px 84px;overflow:hidden}
.jour-inner{flex:1;display:flex;flex-direction:column;width:100%;max-width:440px;margin:0 auto;min-height:0}
/* tout ancre vers le bas : espace vide en haut, puis date, puis carte, puis boutons fixes */
.jour-main{flex:1;display:flex;flex-direction:column;justify-content:flex-end;min-height:0}
.jour-head{flex-shrink:0;margin-bottom:12px}
.jour-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.jour-date{font-size:.7rem;color:var(--text2);font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.jour-count{font-size:.75rem;color:#6366f1;font-weight:700}
.jour-nav{display:flex;align-items:center;gap:8px}
.jour-back{background:#f3f4f6;border:none;color:#374151;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:1.05rem;line-height:1;display:flex;align-items:center;justify-content:center;font-family:inherit;padding:0 0 2px}
.jour-back:active{transform:scale(.88)}
.jour-progress{height:5px;background:#eef0f4;border-radius:3px;overflow:hidden}
.jour-progress-fill{height:100%;background:#6366f1;border-radius:3px;transition:width .3s ease}
.jour-card-zone{flex:0 1 auto;display:flex;min-height:0;overflow:visible;margin-bottom:16px}
.jour-stack{position:relative;width:100%;display:flex}
.jour-stack-bg1{position:absolute;top:14px;left:14px;right:14px;height:100%;background:#eef0f4;border-radius:16px}
.jour-stack-bg2{position:absolute;top:7px;left:7px;right:7px;height:100%;background:#f7f8fa;border:1px solid #eee;border-radius:16px}
.jour-card{position:relative;flex:1;display:flex;flex-direction:column;min-height:0;background:#fff;border:1px solid var(--border);border-radius:16px;padding:22px 20px;box-shadow:0 6px 18px rgba(0,0,0,.08);animation:jourCardIn .32s cubic-bezier(.2,.8,.3,1);will-change:transform,opacity}
@keyframes jourCardIn{from{opacity:0;transform:translateY(16px) scale(.95)}to{opacity:1;transform:none}}
@keyframes jourOutUp{to{opacity:0;transform:translateY(-70px) scale(.9)}}
@keyframes jourOutRight{to{opacity:0;transform:translateX(125%) rotate(9deg)}}
@keyframes jourOutLeft{to{opacity:0;transform:translateX(-125%) rotate(-9deg)}}
@keyframes jourOutDown{to{opacity:0;transform:translateY(72px) scale(.92)}}
.jour-card.exit-done{animation:jourOutUp .34s cubic-bezier(.4,0,.6,1) forwards}
.jour-card.exit-right{animation:jourOutRight .34s cubic-bezier(.4,0,.6,1) forwards}
.jour-card.exit-left{animation:jourOutLeft .34s cubic-bezier(.4,0,.6,1) forwards}
.jour-card.exit-down{animation:jourOutDown .34s cubic-bezier(.4,0,.6,1) forwards}
.jour-actions.fading{opacity:0;transition:opacity .18s ease;pointer-events:none}
.jour-card.kind-late{border-color:#dc2626;border-width:2px;background:#fff6f6;box-shadow:0 0 0 3px rgba(220,38,38,.12),0 6px 18px rgba(0,0,0,.08)}
.jour-card.kind-woken{border-color:#fde68a}
.jour-card.kind-urgent{border-color:#fca5a5}
.jour-kind{flex-shrink:0;font-size:.65rem;font-weight:800;letter-spacing:.04em;margin-bottom:10px}
.jour-kind.kind-urgent{color:#dc2626}
.jour-kind.kind-late{display:inline-block;background:#dc2626;color:#fff;padding:3px 9px;border-radius:7px;letter-spacing:.03em}
/* Pastilles cumulables (POURQUOI la carte est la) + ligne date etiquetee */
.jour-chips{flex-shrink:0;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.jour-chip{font-size:.6rem;font-weight:800;letter-spacing:.02em;padding:3px 8px;border-radius:7px;text-transform:uppercase}
.chip-urgent{background:#fee2e2;color:#dc2626}
.chip-routine{background:#eef0ff;color:#4f46e5}
.chip-woken{background:#fef3c7;color:#b45309}
.chip-late{background:#dc2626;color:#fff}
.chip-due{background:#e0f2fe;color:#0369a1}
.chip-neutral{background:#eef0f4;color:#6b7280}
.jour-dateline{flex-shrink:0;font-size:.72rem;color:var(--text2);margin-top:10px}
.jour-dateline .ico{margin-right:4px}
.jour-dateline.overdue{color:#dc2626;font-weight:700}
.jour-kind.kind-woken{color:#b45309}
.jour-kind.kind-due{color:#0369a1}
.jour-kind.kind-routine{color:#6366f1}
.jour-kind.kind-stale{color:#6b7280}
.jour-scroll{flex:0 1 auto;min-height:0;max-height:46vh;overflow-y:auto}
.jour-title{font-size:1.1rem;font-weight:800;color:#111;line-height:1.3}
.jour-desc{font-size:.78rem;color:#4b5563;margin-top:8px;white-space:pre-wrap}
.jour-context{font-size:.72rem;color:var(--text2);margin-top:10px;font-style:italic}
.jour-go{flex-shrink:0;margin-top:12px}
.jour-actions{flex-shrink:0;display:flex;flex-direction:column;gap:9px}
.jour-btn{border:none;cursor:pointer;font:inherit;font-weight:700;border-radius:12px;padding:14px;font-size:.85rem;transition:.12s}
.jour-btn:active{transform:scale(.97)}
.jour-btn-done{background:#16a34a;color:#fff}
.jour-btn-sec{background:#f3f4f6;color:#374151;flex:1;font-size:.74rem;font-weight:600;padding:13px 6px}
.jour-btn-comment{background:#eef0ff;color:#4f46e5;flex:1;font-size:.74rem;font-weight:600;padding:13px 6px}
.jour-btn-trash{background:#fee2e2;color:#b91c1c;flex:1;font-size:.74rem;font-weight:600;padding:13px 6px}
.jour-row{display:flex;gap:8px}
.jour-cmt-flag{flex-shrink:0;margin-top:10px;font-size:.7rem;color:#4f46e5;font-weight:600}
.cmt-list{max-height:120px;overflow-y:auto;margin-bottom:10px;text-align:left}
.cmt-old{font-size:.74rem;color:#4b5563;background:#f5f6fa;border-radius:8px;padding:7px 9px;margin-bottom:6px}
.cmt-date{font-size:.62rem;color:#9ca3af;font-weight:700;display:block;margin-bottom:2px}
.cmt-input{width:100%;min-height:90px;font:inherit;font-size:.85rem;border:1px solid var(--border);border-radius:10px;padding:10px;resize:vertical;box-sizing:border-box}
.jour-foot{flex-shrink:0}
.jour-done-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.jour-done-check{width:64px;height:64px;border-radius:50%;background:#dcfce7;color:#16a34a;font-size:2rem;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.jour-done-title{font-size:1.15rem;font-weight:800;color:#111}
.jour-done-sub{font-size:.8rem;color:var(--text2);margin-top:6px}
.jour-board-link{display:block;width:100%;text-align:center;margin-top:14px;font-size:.78rem;color:var(--text2);cursor:pointer;background:none;border:none;font-family:inherit;padding:6px}
.jour-review-intro{flex-shrink:0;text-align:center;font-size:.8rem;color:var(--text2);margin-bottom:10px}
.tab-badge{background:var(--accent);color:#fff;font-size:.55rem;padding:1px 5px;border-radius:8px;margin-left:4px;font-weight:700}
.recurrence-fields{margin-top:8px;padding:10px;background:#f8f9fa;border-radius:8px;display:none}
.recurrence-fields.visible{display:block}
.recurrence-fields select,.recurrence-fields input{font-size:.8rem;padding:4px 8px;border:1px solid var(--border);border-radius:6px;margin-top:4px}
.card+.card{margin-top:10px}
.card-title{font-size:.82rem;font-weight:600;line-height:1.3;margin-bottom:4px;padding-right:50px}
.card-desc{font-size:.7rem;color:var(--text2);line-height:1.4;opacity:.75}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.tag{font-size:.6rem;padding:2px 7px;border-radius:10px;font-weight:600}
.tag-urgent{background:#fef2f2;color:#dc2626}
.tag-seo{background:#eff6ff;color:#2563eb}
.tag-business{background:#f0fdf4;color:#16a34a}
.tag-marketing{background:#fefce8;color:#ca8a04}
.tag-tech{background:#faf5ff;color:#9333ea}
.tag-plateformes{background:#fff7ed;color:#ea580c}
.tag-admin{background:#f1f5f9;color:#475569}
.tag-status{font-size:.58rem;padding:2px 6px;border-radius:8px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.tag-a-faire{background:#e0f2fe;color:#0369a1}
.tag-en-cours{background:#fefce8;color:#a16207}
.tag-a-surveiller{background:#f0f9ff;color:#0284c7}
.tag-fait{background:#f0fdf4;color:#15803d}

.done-card{opacity:.45}
.done-card .card-title{text-decoration:line-through}
.btn-done,.btn-urgent{position:absolute;top:10px;width:22px;height:22px;border-radius:50%;border:2px solid #d1d5db;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;padding:0;opacity:0}
.btn-done{right:8px;color:transparent;font-size:12px}
.btn-urgent{right:34px;color:transparent;font-size:10px}
.card:hover .btn-done,.card:hover .btn-urgent{opacity:1}
.btn-done:hover{border-color:var(--green);color:var(--green);background:rgba(22,163,106,.08)}
.btn-urgent:hover{border-color:var(--red);color:var(--red);background:rgba(220,38,38,.08)}
.btn-urgent.is-urgent{border-color:var(--red);background:var(--red);color:#fff;opacity:1;width:18px;height:18px;font-size:9px}
.btn-go{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:.6rem;font-weight:700;background:#eff6ff;color:var(--accent);border:1px solid #bfdbfe;cursor:pointer;text-decoration:none;transition:.15s;margin-left:auto}
.btn-go:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.cat-checks{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.cat-check{cursor:pointer;display:flex;align-items:center;gap:0}
.cat-check input{display:none}
.cat-check .tag{opacity:.4;transition:.15s;cursor:pointer}
.cat-check input:checked+.tag{opacity:1}
.confirm-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.confirm-box{background:#fff;border-radius:14px;padding:24px;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center;animation:mIn .15s ease}
.confirm-box p{font-size:.9rem;font-weight:500;margin-bottom:18px;line-height:1.4;word-break:break-word}
.confirm-btns{display:flex;gap:10px;justify-content:center}
.confirm-btns button{flex:1;padding:10px;border-radius:8px;font-family:var(--font);font-size:.85rem;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:.15s}
.confirm-btns .confirm-yes{background:var(--green);color:#fff;border-color:var(--green)}
.confirm-btns .confirm-yes:hover{background:#15803d}
.confirm-btns .confirm-no{background:var(--surface);color:var(--text)}
.confirm-btns .confirm-no:hover{border-color:var(--accent)}
.confirm-btns .confirm-move{background:var(--accent);color:#fff;border-color:var(--accent)}
.confirm-btns .confirm-move:hover{background:#2563eb}
.confirm-btns .confirm-add{background:#fefce8;color:var(--yellow);border-color:#fef08a}
.confirm-btns .confirm-add:hover{background:#fef9c3}
.urgent-mirror{opacity:.85}
.urgent-mirror .card-origin{font-size:.6rem;color:var(--text2);margin-top:4px;font-style:italic}

/* Drop zone (legacy, kept for compat) */
.drop-zone{display:none}

/* Section separator */
.section-sep{min-width:2px;background:var(--border);border-radius:2px;flex-shrink:0;align-self:stretch;margin:16px 0}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:100}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:mIn .2s ease}
@keyframes mIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.modal h2{font-size:1rem;font-weight:700;margin-bottom:16px}
.modal label{display:block;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:4px;margin-top:12px}
.modal label:first-of-type{margin-top:0}
.modal input,.modal select,.modal textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:var(--font);font-size:.85rem;color:var(--text);outline:none;transition:.15s}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--accent)}
.modal textarea{resize:none;min-height:60px;overflow:hidden;field-sizing:content}
.modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.modal-row{display:flex;gap:10px}
.modal-row>div{flex:1}
.btn-danger{color:var(--red);border-color:var(--red)}
.btn-danger:hover{background:#fef2f2}

/* Tablet */
@media(max-width:1024px){
  .board{gap:10px;padding:12px}
  .column{min-width:250px;max-width:280px}
}

/* ===== APP LAYOUT (vertical stack: header + main + bottom nav) ===== */
.app-layout {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
  height: 100%;
}

/* ===== BOTTOM NAV (replaces side tabs) ===== */
.bottom-nav-wrap {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  z-index: 50;
  display: flex;
  justify-content: center;
  padding: 0;
  pointer-events: none;
}
.bottom-nav {
  pointer-events: auto;
  display: flex;
  align-items: center;
  justify-content: space-around;
  width: 100%;
  padding: 8px 6px;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid rgba(0,0,0,.08);
  box-shadow: 0 -2px 12px rgba(0,0,0,.06);
  gap: 2px;
}
.nav-item {
  position: relative;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 600px;
  border-radius: 14px;
  overflow: visible;
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--font);
  padding: 0;
  min-height: 44px;
}
.nav-item-glow {
  position: absolute;
  inset: 0;
  border-radius: 14px;
  opacity: 0;
  transform: scale(0.8);
  transition: opacity .35s ease, transform .35s cubic-bezier(.2,.8,.3,1);
  pointer-events: none;
  z-index: 0;
}
.nav-item:hover .nav-item-glow,
.nav-item.active .nav-item-glow {
  opacity: 1;
  transform: scale(1.6);
}
.nav-face {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 6px 4px;
  width: 100%;
  height: 100%;
  z-index: 1;
  color: var(--text2);
  transition: color .25s ease, transform .5s cubic-bezier(.2,.8,.3,1);
  transform-style: preserve-3d;
  transform-origin: center bottom;
  border-radius: 14px;
}
.nav-face-back {
  position: absolute;
  inset: 0;
  transform-origin: center top;
  transform: rotateX(90deg);
  opacity: 0;
}
.nav-item:hover .nav-face-front { transform: rotateX(-90deg); opacity: 0; }
.nav-item:hover .nav-face-back { transform: rotateX(0deg); opacity: 1; }
.nav-item.active .nav-face-front,
.nav-item.active .nav-face-back { color: var(--text); }
.nav-item .nav-icon {
  font-size: 1.15rem;
  transition: color .25s ease, transform .25s ease;
}
.nav-item .nav-label {
  font-size: .58rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.nav-item.active .nav-icon { transform: scale(1.1); }
/* Per-tab accent colors (active + hover) */
.nav-item.tab-all:hover .nav-icon, .nav-item.tab-all.active .nav-icon { color: #6366f1; }
.nav-item.tab-urgent:hover .nav-icon, .nav-item.tab-urgent.active .nav-icon { color: #dc2626; }

<script>
const FB_URL='https://sezdo-1-default-rtdb.firebaseio.com/todo';

const CATEGORIES=[
  {id:'admin',icon:'📅',title:'RDV & Admin'},
  {id:'seo',icon:'🔍',title:'SEO'},
  {id:'marketing',icon:'📣',title:'Marketing'},
  {id:'tech',icon:'💻',title:'Tech'},
  {id:'plateformes',icon:'📦',title:'Plateformes'},
  {id:'business',icon:'💼',title:'Business'},
];
const STATUSES=[
  {id:'a-faire',icon:'📝',title:'A faire'},
  {id:'en-cours',icon:'⚡',title:'En cours'},
  {id:'a-surveiller',icon:'👁',title:'A surveiller'},
  {id:'fait',icon:'✅',title:'Fait'},
];
const TABS = [
  { id:'mktg',     icon:'📣', title:'MKTG',     cats:['seo','marketing'] },
  { id:'business', icon:'💼', title:'Business',  cats:['business','admin'] },
  { id:'tech',     icon:'💻', title:'Tech',      cats:['tech','plateformes'] },
  { id:'routine',  icon:'🔄', title:'Routine',   cats:['routine'] },   // future category
  { id:'events',   icon:'📅', title:'Events',    cats:['events'] },    // future category
];
const CAT_TAG_CLASS={seo:'tag-seo',plateformes:'tag-plateformes',marketing:'tag-marketing',tech:'tag-tech',business:'tag-business',admin:'tag-admin'};
const TAG_CLASSES={urgent:'tag-urgent',seo:'tag-seo',business:'tag-business',marketing:'tag-marketing',tech:'tag-tech',plateformes:'tag-plateformes',admin:'tag-admin',uber:'tag-plateformes',deliveroo:'tag-plateformes',delicity:'tag-plateformes',gbp:'tag-seo','google ads':'tag-seo','priorite #1':'tag-urgent',suivi:'tag-a-surveiller'};

function getTabCards(tabId) {
  const tab = TABS.find(t => t.id === tabId);
  if (!tab || !data?.cards) return [];
  return data.cards.filter(c => {
    const cats = getCats(c);
    return cats.some(cat => tab.cats.includes(cat));
  });
}

let data;
let currentTab = 'jour'; // l'app s'ouvre sur le Focus du jour
let expandedCardId = null; // pour accordion mobile
// Etat session du Focus du jour
// Session Focus du jour : liste navigable + pointeur + historique d'annulation
let jourMode = 'today';        // 'today' (urgent/echeances/routines) | 'extended' (les autres cartes)
let jourList = null;           // tableau ordonne d'ids pour la passe en cours (null = a (re)construire)
let jourPos = 0;               // index courant dans jourList
let jourHistory = [];          // pile d'undo : {cardId, prev:{...champs}}
let jourSeen = new Set();      // ids deja injectes dans une liste cette session (anti-doublon today/extended)
function getCats(card){
  if(Array.isArray(card.categories))return card.categories;
  if(card.category)return[card.category];
  return['business'];
} // 'category' or 'status'
let dragCard=null;

// --- Recurrence helpers ---
function todayStr(){return new Date().toISOString().slice(0,10)}
function calcNextDue(rec, fromDate){
  const d = fromDate ? new Date(fromDate+'T00:00:00') : new Date();
  if(rec.freq==='daily'){
    d.setDate(d.getDate()+1);
  } else if(rec.freq==='weekly'){
    const target=rec.day??1;
    do { d.setDate(d.getDate()+1) } while(d.getDay()!==target);
  } else if(rec.freq==='monthly'){
    const target=rec.date??1;
    d.setMonth(d.getMonth()+(d.getDate()>=target?1:0));
    d.setDate(Math.min(target, new Date(d.getFullYear(),d.getMonth()+1,0).getDate()));
  }
  return d.toISOString().slice(0,10);
}
function isRoutineDue(card){
  return card.recurrence && card.nextDue && card.nextDue <= todayStr();
}
function activateDueRoutines(){
  let changed=false;
  data.cards.forEach(c=>{
    if(c.recurrence && c.nextDue && c.nextDue<=todayStr() && c.status!=='a-faire'){
      c.status='a-faire';
      changed=true;
    }
  });
  if(changed) save();
}
function countDueRoutines(){
  return data.cards.filter(c=>isRoutineDue(c)&&c.status!=='fait').length;
}
function formatDueDate(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const days=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const months=['Jan','Fev','Mar','Avr','Mai','Juin','Juil','Aout','Sep','Oct','Nov','Dec'];
  return days[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()]+' '+String(d.getFullYear()).slice(2);
}
function updateRecurFields(){
  const freq=document.getElementById('fRecurFreq').value;
  document.getElementById('recurDayWrap').style.display=freq==='weekly'?'inline':'none';
  document.getElementById('recurDateWrap').style.display=freq==='monthly'?'inline':'none';
}
function showRecurrenceIfRoutine(){
  const isRoutine=document.querySelector('#fCats input[value="routine"]').checked;
  document.getElementById('recurrenceFields').classList.toggle('visible',isRoutine);
}

// --- Relevance helpers ---
function touch(card){card.touchedAt=todayStr();if(!card.createdAt)card.createdAt=todayStr()}
function addDays(dateStr,n){const d=new Date(dateStr+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function daysSinceTouch(card){
  if(!card.touchedAt)return 0;
  return Math.max(0,Math.floor((new Date(todayStr()+'T00:00:00')-new Date(card.touchedAt+'T00:00:00'))/86400000));
}
function isSnoozed(card){return !!card.snoozeUntil&&card.snoozeUntil>todayStr()&&card.status!=='fait'}
function isWoken(card){return !!card.snoozeUntil&&card.snoozeUntil<=todayStr()&&card.status!=='fait'}
function wakeSnoozedCards(){
  let changed=false;
  data.cards.forEach(c=>{
    if(c.status==='a-surveiller'&&c.snoozeUntil&&c.snoozeUntil<=todayStr()){
      c.status='a-faire'; // snoozeUntil kept as "woken" marker until card is treated
      changed=true;
    }
  });
  if(changed) save();
}
function relevanceBand(card){
  if(card.urgent||isRoutineDue(card)||isWoken(card))return 1;
  if(card.dueDate&&card.dueDate<todayStr())return 2;
  if(card.dueDate&&card.dueDate<=addDays(todayStr(),7))return 3;
  if(isSnoozed(card))return 5;
  return 4;
}
function relevanceSort(a,b){
  const ba=relevanceBand(a),bb=relevanceBand(b);
  if(ba!==bb)return ba-bb;
  if(ba===1)return (a.urgentOrder??999)-(b.urgentOrder??999);
  if(ba===2||ba===3)return (a.dueDate||'').localeCompare(b.dueDate||'');
  if(ba===5)return (a.snoozeUntil||'').localeCompare(b.snoozeUntil||'');
  // band 4: most recently touched first, manual order as tiebreaker
  const ta=a.touchedAt||'',tb=b.touchedAt||'';
  if(ta!==tb)return tb.localeCompare(ta);
  return (a.sortOrder??999)-(b.sortOrder??999);
}

async function load(){
  try{
    const res=await fetch(FB_URL+'.json');
    if(res.ok) data=await res.json();
    else throw new Error();
    if(!data||!data.cards) data={cards:[]};
    // Firebase may return cards as object instead of array — normalize
    if(data.cards&&!Array.isArray(data.cards)){
      const arr=[];
      Object.keys(data.cards).forEach(k=>{if(data.cards[k])arr.push(data.cards[k])});
      data.cards=arr;
    }
    sanitizeCards();
    activateDueRoutines();
    wakeSnoozedCards();
  }catch{
    data={cards:[]};
  }
}
function sanitizeText(s){
  if(!s)return s;
  return s.replace(/\u2014|\u2013/g,' - ')
    .replace(/\u20ac/g,'EUR')
    .replace(/[\u201c\u201d]/g,'"')
    .replace(/[\u2018\u2019]/g,"'")
    .replace(/\u2026/g,'...')
    .replace(/[^\x00-\x7F]/g,'');
}
function sanitizeCards(){
  if(!data||!data.cards)return;
  data.cards.forEach(c=>{
    if(c.title)c.title=sanitizeText(c.title);
    if(c.desc)c.desc=sanitizeText(c.desc);
  });
}
function save(){
  sanitizeCards();
  fetch(FB_URL+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).catch(()=>{});
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}


function renderTabs() {
  const container = document.getElementById('sideTabs');
  if (!container) return;
  container.innerHTML = '';

  // Build full list: Jour first, then All, Urgent, then categories
  const allItems = [
    { id:'jour', icon:'🎯', title:'Jour' },
    { id:'all', icon:'📋', title:'All' },
    { id:'urgent', icon:'🔴', title:'Urgent' },
    ...TABS
  ];

  // Per-tab gradient colors for the glow effect
  const gradients = {
    jour:     'radial-gradient(circle, rgba(99,102,241,.22) 0%, rgba(99,102,241,.08) 50%, rgba(99,102,241,0) 100%)',

function buildCard(card,isMirror){
  const c=document.createElement('div');
  const isDone=card.status==='fait';
  const stale=daysSinceTouch(card);
  const fadeCls=!isDone&&!isSnoozed(card)?(stale>=60?' card-faded-60':stale>=30?' card-faded-30':''):'';
  c.className='card'+(isDone?' done-card':'')+(card.urgent?' card-urgent':'')+(isMirror?' urgent-mirror':'')+(isRoutineDue(card)?' card-routine-due':'')+(isSnoozed(card)?' card-snoozed':'')+(isWoken(card)?' card-woken':'')+fadeCls;
  c.draggable=false;
  c.dataset.id=card.id;

  const cats=getCats(card);
  const st=STATUSES.find(s=>s.id===card.status);
  const catTags=cats.map(cid=>{const ct=CATEGORIES.find(c=>c.id===cid);return ct?`<span class="tag ${CAT_TAG_CLASS[cid]||'tag-business'}">${ct.title}</span>`:''}).join('');
  const statusTag=st?`<span class="tag tag-status tag-${card.status}">${st.title}</span>`:'';

  const extraTagHtml=(card.tags||[]).map(t=>{
    const cls=TAG_CLASSES[t.toLowerCase()]||'tag-business';
    return `<span class="tag ${cls}">${esc(t)}</span>`;
  }).join('');
  const ageTag=!isDone&&stale>=21?`<span class="tag tag-age">${stale} j</span>`:'';
  const tagHtml=catTags+statusTag+extraTagHtml+ageTag;

  const doneBtn=!isDone&&!isMirror?`<button class="btn-done" title="Fait">&#10003;</button>`:'';
  const urgentBtn=!isDone?`<button class="btn-urgent${card.urgent?' is-urgent':''}" title="Urgent">!</button>`:'';
  const originLabel=isMirror?`<div class="card-origin">${cats.map(cid=>(CATEGORIES.find(c=>c.id===cid)||{}).title||'').join(', ')} · ${esc((st||{}).title||'')}</div>`:'';
  const nextDueLabel=card.recurrence&&card.nextDue?`<div class="card-next-due">Prochain : ${formatDueDate(card.nextDue)}</div>`:'';
  const dueLabel=!card.recurrence&&card.dueDate?`<div class="card-next-due${card.dueDate<todayStr()?' overdue':''}">Echeance : ${formatDueDate(card.dueDate)}</div>`:'';
  const snoozeLabel=isSnoozed(card)?`<div class="card-next-due">&#9208;&#65039; Reveil : ${formatDueDate(card.snoozeUntil)}</div>`:isWoken(card)?`<div class="card-next-due overdue">&#9200; Reveillee - a traiter</div>`:'';

  c.innerHTML=`
    ${doneBtn}${!isMirror?urgentBtn:''}
    <div class="card-title">${esc(card.title)}</div>
    <div class="card-desc">${esc(card.desc)}</div>
    <div class="card-tags">${tagHtml}${card.url?`<a class="btn-go" href="${esc(card.url)}" target="_blank" onclick="event.stopPropagation()">Go &rarr;</a>`:''}</div>
    ${nextDueLabel}${dueLabel}${snoozeLabel}${originLabel}
  `;

  const db=c.querySelector('.btn-done');
  if(db) db.addEventListener('click',e=>{e.stopPropagation();markDone(card.id)});
  const ub=c.querySelector('.btn-urgent');
  if(ub) ub.addEventListener('click',e=>{e.stopPropagation();toggleUrgent(card.id)});
  c.addEventListener('click',()=>openModal(card.id));
  {
    c.addEventListener('mousedown',e=>{if(e.target.closest('button')||e.target.closest('a'))return;startDrag(e,card,c)});
    let holdTimer=null;
    c.addEventListener('touchstart',e=>{
      if(e.target.closest('button')||e.target.closest('a'))return;
      holdTimer=setTimeout(()=>{holdTimer=null;c.style.opacity='.6';startDrag(e,card,c,true)},400);
    },{passive:false});
    c.addEventListener('touchmove',()=>{if(holdTimer){clearTimeout(holdTimer);holdTimer=null}});
    c.addEventListener('touchend',()=>{if(holdTimer){clearTimeout(holdTimer);holdTimer=null}c.style.opacity=''});
  }
  return c;
}

function render() {
  updateStats();
  renderTabs();
  const jv = document.getElementById('jourView');
  if (currentTab === 'jour') {
    document.getElementById('board').style.display = 'none';
    document.getElementById('mobileList').style.display = 'none';
    jv.style.display = '';
    renderJour();
    return;
  }
  jv.style.display = 'none';
  if (window.innerWidth <= 700) {
    document.getElementById('board').style.display = 'none';
    document.getElementById('mobileList').style.display = '';
    renderMobile();
  } else {
    document.getElementById('mobileList').style.display = 'none';
    document.getElementById('board').style.display = '';
    renderDesktop();
  }
}

// --- Focus du jour ---
// File du jour : urgent / routine due / reveil echu / echeance arrivee
function jourTodayIds(){
  return data.cards
    .filter(c=>c.status!=='fait'&&(c.urgent||isRoutineDue(c)||isWoken(c)||(c.dueDate&&c.dueDate<=todayStr())))
    .sort(relevanceSort).map(c=>c.id);
}
// Autres cartes : tout le reste d'actif, hors cartes en veille (snooze futur) et hors deja vues cette session
function jourExtendedIds(){
  return data.cards
    .filter(c=>c.status!=='fait'&&!isSnoozed(c)&&!jourSeen.has(c.id))
    .sort(relevanceSort).map(c=>c.id);
}
function jourResetSession(){
  jourMode='today'; jourList=null; jourPos=0; jourHistory=[]; jourSeen=new Set();
}
function jourStartExtended(){
  jourMode='extended'; jourList=null; jourPos=0; jourHistory=[];
  render();
}
function jourCurrentId(){ return (jourList&&jourPos<jourList.length)?jourList[jourPos]:null; }
function jourSnap(card){
  const s={};
  ['status','urgent','done','doneAt','snoozeUntil','dueDate','nextDue','lastDoneAt','touchedAt'].forEach(k=>s[k]=card[k]);
  s.comments=card.comments?JSON.parse(JSON.stringify(card.comments)):undefined;
  return s;
}
function jourRestore(card,s){
  ['status','urgent','done','doneAt','snoozeUntil','dueDate','nextDue','lastDoneAt','touchedAt','comments'].forEach(k=>{
    if(s[k]===undefined)delete card[k]; else card[k]=s[k];
  });
}
// Applique une mutation a la carte courante (avec animation), enregistre l'undo, avance d'une carte
function jourAct(dir,mutate){
  const card=data.cards.find(c=>c.id===jourCurrentId());
  if(!card)return;
  jourExit(dir,()=>{
    jourHistory.push({cardId:card.id,prev:jourSnap(card)});
    mutate(card);
    jourPos++;
    save();render();
  });
}
function jourBack(){
  if(jourPos<=0||!jourHistory.length)return;
  const h=jourHistory.pop();
  const card=data.cards.find(c=>c.id===h.cardId);
  if(card)jourRestore(card,h.prev);
  jourPos--;
  save();render();
}
// POURQUOI cette carte est dans la file : pastilles cumulables (type + etat)
function jourChips(card){
  const T=todayStr();
  const chips=[];
  if(card.urgent) chips.push({cls:'chip-urgent',label:'&#128308; Urgent'});
  if(card.recurrence) chips.push({cls:'chip-routine',label:'&#128260; Routine'});
  if(isWoken(card)) chips.push({cls:'chip-woken',label:'&#9200; Reveillee'});
  const lateRec = card.recurrence && card.nextDue && card.nextDue<T;
  const lateDue = !card.recurrence && card.dueDate && card.dueDate<T;
  if(lateRec||lateDue) chips.push({cls:'chip-late',label:'&#9888;&#65039; En retard'});
  else if(!card.recurrence && card.dueDate) chips.push({cls:'chip-due',label:'&#128197; Echeance'});
  if(!chips.length){
    const st=(STATUSES.find(s=>s.id===card.status)||{}).title||'A traiter';
    chips.push({cls:'chip-neutral',label:esc(st)});
  }
  return chips;
}
// LA DATE : une seule ligne, toujours etiquetee clairement
function jourDateLine(card){
  const T=todayStr();
  if(card.recurrence && card.nextDue){
    if(card.nextDue<T) return {txt:'En retard depuis le '+formatDueDate(card.nextDue),over:true};
    return {txt:'Prochaine : '+formatDueDate(card.nextDue),over:false};
  }
  if(!card.recurrence && card.dueDate){
    if(card.dueDate<T) return {txt:'En retard depuis le '+formatDueDate(card.dueDate),over:true};
    return {txt:'A faire avant : '+formatDueDate(card.dueDate),over:false};
  }
  if(isWoken(card)) return {txt:'Reveil demande le '+formatDueDate(card.snoozeUntil),over:false};
  if(isSnoozed(card)) return {txt:'Reveil : '+formatDueDate(card.snoozeUntil),over:false};
  return null;
}
// Classe d'emphase de la carte (bordure/fond) selon l'etat le plus important
function jourPrimaryClass(card){
  const T=todayStr();
  const lateRec=card.recurrence&&card.nextDue&&card.nextDue<T;
  const lateDue=!card.recurrence&&card.dueDate&&card.dueDate<T;
  if(lateRec||lateDue) return 'kind-late';
  if(card.urgent) return 'kind-urgent';
  if(isWoken(card)) return 'kind-woken';
  return '';
}
// Zone carte uniquement (les boutons sont rendus separement, en position fixe)
function buildJourCardZone(card){
  const chips=jourChips(card).map(c=>`<span class="jour-chip ${c.cls}">${c.label}</span>`).join('');
  const dl=jourDateLine(card);
  const primary=jourPrimaryClass(card);
  return `
    <div class="jour-card-zone">
      <div class="jour-stack">
        <div class="jour-stack-bg1"></div>
        <div class="jour-stack-bg2"></div>
        <div class="jour-card ${primary}">
          <div class="jour-chips">${chips}</div>
          <div class="jour-scroll">
            <div class="jour-title">${esc(card.title)}</div>
            ${card.desc?`<div class="jour-desc">${esc(card.desc)}</div>`:''}
          </div>
          ${dl?`<div class="jour-dateline${dl.over?' overdue':''}"><span class="ico">&#128197;</span>${dl.txt}</div>`:''}
          ${card.comments&&card.comments.length?`<div class="jour-cmt-flag">&#128172; ${card.comments.length} note${card.comments.length>1?'s':''}</div>`:''}
          ${card.url?`<div class="jour-go"><a class="btn-go" href="${esc(card.url)}" target="_blank">Go &rarr;</a></div>`:''}
        </div>
      </div>
    </div>
  `;
}
function renderJour(){
  const jv=document.getElementById('jourView');
  // (re)construction de la liste de la passe en cours
  if(jourList===null){
    jourList = jourMode==='extended' ? jourExtendedIds() : jourTodayIds();
    jourList.forEach(id=>jourSeen.add(id));
    jourPos=0; jourHistory=[];
  }
  const boardLink=`<div class="jour-foot"><button class="jour-board-link" onclick="currentTab='all';render()">Tout le board &rarr;</button></div>`;

  // passe terminee ?
  if(jourPos>=jourList.length){ renderJourDone(jv); return; }

  // carte courante (sauter les ids disparus)
  let card=data.cards.find(c=>c.id===jourList[jourPos]);
  if(!card){ jourPos++; renderJour(); return; }

  const total=jourList.length;
  const pct=Math.round(jourPos/total*100);
  const backBtn = jourPos>0 ? `<button class="jour-back" onclick="jourBack()" title="Carte precedente">&#8249;</button>` : '';
  const headLabel = jourMode==='extended' ? 'AUTRES CARTES' : formatDueDate(todayStr());

  jv.innerHTML=`<div class="jour-inner">
    <div class="jour-main">
      <div class="jour-head">
        <div class="jour-top">
          <span class="jour-date">${headLabel}</span>
          <span class="jour-nav">${backBtn}<span class="jour-count">${jourPos+1} / ${total}</span></span>
        </div>
        <div class="jour-progress"><div class="jour-progress-fill" style="width:${pct}%"></div></div>
      </div>
      ${buildJourCardZone(card)}
    </div>
    <div class="jour-actions">
      <button class="jour-btn jour-btn-done" onclick="jourDone()">&#10003; Fait</button>
      <div class="jour-row">
        <button class="jour-btn jour-btn-sec" onclick="jourReport()">&#9200; Reporter</button>
        <button class="jour-btn jour-btn-comment" onclick="jourComment()">&#128172; Commentaire</button>
        <button class="jour-btn jour-btn-sec" onclick="jourPass()">Passer &rarr;</button>
      </div>
    </div>
    ${boardLink}
  </div>`;
}
function renderJourDone(jv){
  let extraBtn='';
  if(jourMode!=='extended'){
    const n=jourExtendedIds().length;
    if(n>0) extraBtn=`<button class="jour-btn jour-btn-done" style="margin-top:20px;max-width:300px" onclick="jourStartExtended()">Traiter les autres cartes (${n}) &rarr;</button>`;
  }
  const title = jourMode==='extended' ? 'Revue terminee' : 'Tout est propre';
  const sub = jourMode==='extended' ? 'Tu as fait le tour des autres cartes.' : "Rien d'autre d'urgent aujourd'hui.";
  jv.innerHTML=`<div class="jour-inner"><div class="jour-done-screen">
    <div class="jour-done-check">&#10003;</div>
    <div class="jour-done-title">${title}</div>
    <div class="jour-done-sub">${sub}</div>
    ${extraBtn}
    <button class="jour-board-link" onclick="currentTab='all';render()">Tout le board &rarr;</button>
  </div></div>`;
}
// Joue l'animation de sortie de la carte courante puis execute apply()
function jourExit(dir,apply){
  const cardEl=document.querySelector('#jourView .jour-card');
  const actions=document.querySelector('#jourView .jour-actions');
  if(!cardEl){apply();return;}
  if(actions)actions.classList.add('fading');
  cardEl.classList.add('exit-'+dir);
  let done=false;
  const finish=()=>{if(done)return;done=true;apply();};
  cardEl.addEventListener('animationend',finish,{once:true});
  setTimeout(finish,420); // fallback si animationend ne tire pas
}
function jourDone(){
  jourAct('done',card=>{
    if(card.recurrence){
      card.nextDue=calcNextDue(card.recurrence,todayStr());
      card.status='a-faire';
      card.lastDoneAt=Date.now();
    } else {
      card.status='fait';card.urgent=false;card.done=true;card.doneAt=Date.now();
      delete card.snoozeUntil;
    }
    touch(card);
  });
}
function jourReport(){
  const card=data.cards.find(c=>c.id===jourCurrentId());
  if(!card)return;
  showReportPrompt(card,date=>{
    jourAct('right',c=>{
      if(c.recurrence){
        c.nextDue=date;
        c.status='a-faire';
      } else {
        c.status='a-surveiller';
        c.snoozeUntil=date;
        c.urgent=false;
        if(c.dueDate&&c.dueDate<date)c.dueDate=date;
      }
      touch(c);
    });
  });
}
function jourPass(){
  jourAct('left',()=>{ /* aucune modification : on avance simplement */ });
}
// Commentaire : annote la fiche (champ Firebase `comments`) sans la modifier autrement, puis passe a la suivante.
// Sert au futur traitement IA quotidien (lecture des notes -> propositions de modif).
function jourComment(){
  const card=data.cards.find(c=>c.id===jourCurrentId());
  if(!card)return;
  showCommentPrompt(card,txt=>{
    jourAct('down',c=>{
      if(!Array.isArray(c.comments))c.comments=[];
      c.comments.push({at:todayStr(),text:txt});
      touch(c);
    });
  });
}
function showCommentPrompt(card,onSave,onCancel){
  const existing=(card.comments||[]).map(c=>
    `<div class="cmt-old"><span class="cmt-date">${c.at?formatDueDate(c.at):''}</span>${esc(c.text)}</div>`
  ).join('');
  const bg=document.createElement('div');bg.className='confirm-bg';
  bg.innerHTML=`<div class="confirm-box" style="text-align:left;max-width:380px">
    <p style="text-align:center">&#128172; Commentaire</p>
    <div style="font-size:.82rem;font-weight:700;color:#111;margin-bottom:10px;text-align:center">${esc(card.title)}</div>
    ${existing?`<div class="cmt-list">${existing}</div>`:''}
    <textarea class="cmt-input" placeholder="Dicte ou ecris ta note pour traiter cette fiche plus tard (changer le titre, la deadline, l'approche...)"></textarea>
    <div class="confirm-btns" style="margin-top:12px">
      <button class="confirm-no">Annuler</button>
      <button class="confirm-yes">Valider</button>
    </div>
  </div>`;
  document.body.appendChild(bg);
  const ta=bg.querySelector('.cmt-input');
  setTimeout(()=>ta.focus(),60);
  bg.querySelector('.confirm-yes').addEventListener('click',()=>{
    const txt=ta.value.trim();
    bg.remove();
    if(txt)onSave(txt);else if(onCancel)onCancel();
  });
  bg.querySelector('.confirm-no').addEventListener('click',()=>{bg.remove();if(onCancel)onCancel()});
  bg.addEventListener('click',e=>{if(e.target===bg){bg.remove();if(onCancel)onCancel()}});
}
function showReportPrompt(card,onPick,onCancel){
  const bg=document.createElement('div');bg.className='confirm-bg';
  bg.innerHTML=`<div class="confirm-box"><p>Reporter "${esc(card.title)}" a quand ?</p>
    <div class="confirm-btns" style="flex-direction:column">
      <button data-days="1">Demain</button>
      <button data-days="3">Dans 3 jours</button>
      <button data-days="7">Dans 1 semaine</button>
      <input type="date" class="snz-date" style="padding:8px;border:1px solid var(--border);border-radius:6px;font:inherit">
      <button class="confirm-no">Annuler</button>
    </div></div>`;
  document.body.appendChild(bg);
  bg.querySelectorAll('[data-days]').forEach(b=>b.addEventListener('click',()=>{
    const d=addDays(todayStr(),+b.dataset.days);
    bg.remove();onPick(d);
  }));
  bg.querySelector('.snz-date').addEventListener('change',e=>{
    if(e.target.value){bg.remove();onPick(e.target.value)}
  });
  bg.querySelector('.confirm-no').addEventListener('click',()=>{bg.remove();if(onCancel)onCancel()});
  bg.addEventListener('click',e=>{if(e.target===bg){bg.remove();if(onCancel)onCancel()}});
}

function renderMobile() {
  const list = document.getElementById('mobileList');
  list.innerHTML = '';

  // ALL tab — group by category
  if (currentTab === 'all') {
    let any = false;
    TABS.forEach(tab => {
      const tabCards = getTabCards(tab.id).filter(c => c.status !== 'fait');
      tabCards.sort(relevanceSort);
      if (tabCards.length === 0) return;
      any = true;
      const header = document.createElement('div');
      header.className = 'mobile-section-header';
      header.innerHTML = `<span>${tab.icon} ${tab.title}</span><span class="mobile-section-count">${tabCards.length}</span>`;
      list.appendChild(header);
      tabCards.forEach(card => list.appendChild(buildMobileCard(card)));
    });
    if (!any) {
      list.innerHTML = '<div style="padding:24px 16px;color:var(--text2);font-size:.82rem;text-align:center">Aucune tache</div>';
    }
    return;
  }

  let cards;
  if (currentTab === 'urgent') {
    cards = data.cards.filter(c => (c.urgent || isRoutineDue(c) || isWoken(c)) && c.status !== 'fait');
  } else {
    cards = getTabCards(currentTab).filter(c => c.status !== 'fait');
  }
  cards.sort(relevanceSort);

  if (cards.length === 0) {
    list.innerHTML = '<div style="padding:24px 16px;color:var(--text2);font-size:.82rem;text-align:center">Aucune tache ici</div>';
    return;
  }

  cards.forEach(card => list.appendChild(buildMobileCard(card)));
}

function buildMobileCard(card) {
  const isDone = card.status === 'fait';
  const isExpanded = expandedCardId === card.id;

  const el = document.createElement('div');
  const stale = daysSinceTouch(card);
  const fadeCls = !isDone && !isSnoozed(card) ? (stale >= 60 ? ' card-faded-60' : stale >= 30 ? ' card-faded-30' : '') : '';
  el.className = 'mobile-card' + (card.urgent ? ' urgent-card' : '') + (isSnoozed(card) ? ' card-snoozed' : '') + (isWoken(card) ? ' card-woken' : '') + fadeCls;
  el.dataset.id = card.id;

  // Tags HTML
  const st = STATUSES.find(s => s.id === card.status);
  const statusTag = st ? `<span class="tag tag-status tag-${card.status}">${st.title}</span>` : '';
  const extraTagHtml = (card.tags || []).map(t => {
    const cls = TAG_CLASSES[t.toLowerCase()] || 'tag-business';
    return `<span class="tag ${cls}">${esc(t)}</span>`;
  }).join('');
  const ageTag = !isDone && stale >= 21 ? `<span class="tag tag-age">${stale} j</span>` : '';
  const mobDueLine = !card.recurrence && card.dueDate ? `<div class="card-next-due${card.dueDate < todayStr() ? ' overdue' : ''}">Echeance : ${formatDueDate(card.dueDate)}</div>` : '';
  const mobSnoozeLine = isSnoozed(card) ? `<div class="card-next-due">&#9208;&#65039; Reveil : ${formatDueDate(card.snoozeUntil)}</div>` : isWoken(card) ? `<div class="card-next-due overdue">&#9200; Reveillee - a traiter</div>` : '';

  el.innerHTML = `
    <div class="mobile-card-check${isDone ? ' done' : ''}" data-action="check">
      ${isDone ? '&#10003;' : ''}
    </div>
    <div class="mobile-card-body">
      <div class="mobile-card-title${isDone ? ' done-title' : ''}">${esc(card.title)}</div>
      ${mobDueLine}${mobSnoozeLine}
      <div class="mobile-card-detail${isExpanded ? ' open' : ''}">
        ${card.desc ? `<div class="mobile-card-desc">${esc(card.desc)}</div>` : ''}
        <div class="mobile-card-tags">${statusTag}${extraTagHtml}${ageTag}</div>
        <div class="mobile-card-actions">
          ${card.url ? `<a class="btn-go" href="${esc(card.url)}" target="_blank">Go &rarr;</a>` : ''}
          <button class="mobile-urgent-toggle${card.urgent ? ' is-urgent' : ''}" data-action="urgent">
            ${card.urgent ? '&#128308; Urgent' : '! Urgent'}
          </button>
        </div>
      </div>
    </div>
    <div class="mobile-card-urgent-dot${card.urgent ? ' visible' : ''}"></div>
  `;

  // Checkbox (marquer fait)
  el.querySelector('[data-action="check"]').addEventListener('click', e => {
    e.stopPropagation();
    markDone(card.id);
  });

  // Toggle urgent
  el.querySelector('[data-action="urgent"]').addEventListener('click', e => {
    e.stopPropagation();
    toggleUrgent(card.id);
  });

  // Tap = expand/collapse (accordion)
  let tapTimer = null;
  let tapCount = 0;

  el.addEventListener('click', e => {
    if (e.target.closest('[data-action]') || e.target.closest('a')) return;
    tapCount++;
    if (tapCount === 1) {
      tapTimer = setTimeout(() => {
        tapCount = 0;
        // Single tap = toggle expand (accordion)
        if (expandedCardId === card.id) {
          expandedCardId = null;
        } else {
          expandedCardId = card.id;
        }
        renderMobile();
      }, 250);
    } else {
      clearTimeout(tapTimer);
      tapCount = 0;
      // Double tap = open modal edit
      openModal(card.id);
    }
  });

  return el;
}

function renderDesktop() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  // ALL tab — columns are categories (Urgent, MKTG, Business, Tech, Routine, Events)
  if (currentTab === 'all') {
    const allActive = data.cards.filter(c => c.status !== 'fait');
    const columns = [
      { id:'urgent', icon:'🔴', title:'Urgent', filter: c => c.urgent || isRoutineDue(c) || isWoken(c) },
      ...TABS.map(t => ({ id:t.id, icon:t.icon, title:t.title, filter: c => getCats(c).some(cat => t.cats.includes(cat)) && !(c.urgent || isRoutineDue(c) || isWoken(c)) }))
    ];
    columns.forEach(col => {
      const cards = allActive.filter(col.filter).sort(relevanceSort);
      if (cards.length === 0) return;
      const div = document.createElement('div');
      div.className = 'column';
      div.dataset.group = col.id;
      div.dataset.colMode = 'category';
      div.innerHTML = `
        <div class="col-header">
          <span class="col-icon">${col.icon}</span>
          <span class="col-title">${esc(col.title)}</span>
          <span class="col-count">${cards.length}</span>
          <button class="col-add" onclick="openModalNew('${col.id}')" title="Ajouter">+</button>
        </div>
        <div class="col-cards" data-group="${col.id}"></div>
      `;
      const container = div.querySelector('.col-cards');
      cards.forEach(card => container.appendChild(buildCard(card, false)));
      board.appendChild(div);
    });
    return;
  }

  // Filter cards by active tab
  let tabCards;
  if (currentTab === 'urgent') {
    tabCards = data.cards.filter(c => (c.urgent || isRoutineDue(c) || isWoken(c)) && c.status !== 'fait');
  } else {
    tabCards = getTabCards(currentTab).filter(c => c.status !== 'fait');
  }

  // Columns are statuses (kanban model)
  STATUSES.filter(s => s.id !== 'fait').forEach(col => {
    const cards = tabCards.filter(c => c.status === col.id);
    cards.sort(relevanceSort);

    if (cards.length === 0) return;

    const div = document.createElement('div');
    div.className = 'column';
    div.dataset.group = col.id;
    div.innerHTML = `
      <div class="col-header">
        <span class="col-icon">${col.icon}</span>
        <span class="col-title">${esc(col.title)}</span>
        <span class="col-count">${cards.length}</span>
        <button class="col-add" onclick="openModalNew(currentTab,'${col.id}')" title="Ajouter">+</button>
      </div>
      <div class="col-cards" data-group="${col.id}"></div>
    `;
    const container = div.querySelector('.col-cards');
    cards.forEach(card => container.appendChild(buildCard(card, false)));
    board.appendChild(div);
  });
}

function markDone(cardId){
  const card=data.cards.find(c=>c.id===cardId);
  if(card.recurrence){
    showConfirm('Marquer "'+card.title+'" comme fait ? (reviendra a la prochaine occurrence)',()=>{
      card.nextDue=calcNextDue(card.recurrence, todayStr());
      card.status='a-faire';
      card.lastDoneAt=Date.now();
      touch(card);
      save();render();
    });
  } else {
    showConfirm('Marquer "'+card.title+'" comme fait ?',()=>{
      card.status='fait';card.urgent=false;card.done=true;card.doneAt=Date.now();
      delete card.snoozeUntil;touch(card);
      save();render();
    });
  }
}

function toggleUrgent(cardId){
  const card=data.cards.find(c=>c.id===cardId);
  card.urgent=!card.urgent;
  touch(card);
  save();render();
}

function getDragAfter(container,y){
  const cards=[...container.querySelectorAll('.card:not(.dragging)')];
  let closest=null,closestOffset=Number.NEGATIVE_INFINITY;
  cards.forEach(c=>{
    const box=c.getBoundingClientRect();
    const offset=y-box.top-box.height/2;
    if(offset<0&&offset>closestOffset){closestOffset=offset;closest=c}
  });
  return closest;
}

function saveCard(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title)return document.getElementById('fTitle').focus();
  const desc=document.getElementById('fDesc').value.trim();
  const tags=document.getElementById('fTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const cats=getCheckedCats();
  const status=document.getElementById('fStatus').value;
  const urgent=document.getElementById('fUrgent').checked;
  const url=document.getElementById('fUrl').value.trim()||null;
  const editId=document.getElementById('fId').value;

  // Build recurrence object if routine
  let recurrence=null, nextDue=null;
  const recurFreq=document.getElementById('fRecurFreq').value;
  if(recurFreq && cats.includes('routine')){
    recurrence={freq:recurFreq};
    if(recurFreq==='weekly') recurrence.day=+document.getElementById('fRecurDay').value;
    if(recurFreq==='monthly') recurrence.date=+document.getElementById('fRecurDate').value;
  }

  // Parse Claude Context
  let claudeContext=null;
  const ctxRaw=document.getElementById('fClaudeContext').value.trim();
  if(ctxRaw){
    try{claudeContext=JSON.parse(ctxRaw)}
    catch(e){claudeContext={notes:ctxRaw}} // texte libre accepte (plus de blocage JSON)
  }

  // Due date (optional) + snooze date (required when a-surveiller)
  const dueDate=document.getElementById('fDueDate').value||null;
  const snoozeUntil=document.getElementById('fSnoozeUntil').value||null;
  if(status==='a-surveiller'&&!snoozeUntil){
    alert('Une carte "A surveiller" doit avoir une date de reveil.');
    document.getElementById('fSnoozeUntil').focus();
    return;
  }

  if(editId){
    const card=data.cards.find(c=>c.id===+editId);
    card.title=title;card.desc=desc;card.tags=tags;card.url=url;
    card.categories=cats;delete card.category;
    card.status=status;card.urgent=urgent;
    card.done=status==='fait';
    if(status==='fait'&&!card.doneAt)card.doneAt=Date.now();
    if(dueDate)card.dueDate=dueDate;else delete card.dueDate;
    if(status==='a-surveiller')card.snoozeUntil=snoozeUntil;else delete card.snoozeUntil;
    if(recurrence){card.recurrence=recurrence;if(!card.nextDue)card.nextDue=calcNextDue(recurrence,todayStr())}
    else{delete card.recurrence;delete card.nextDue}
    if(claudeContext)card.claudeContext=claudeContext;else delete card.claudeContext;
    touch(card);
  } else {
    const maxId=Math.max(0,...data.cards.map(c=>c.id));
    const newCard={id:maxId+1,title,desc,tags,url,categories:cats,status,urgent,done:status==='fait',createdAt:todayStr(),touchedAt:todayStr()};
    if(dueDate)newCard.dueDate=dueDate;
    if(status==='a-surveiller')newCard.snoozeUntil=snoozeUntil;
    if(recurrence){newCard.recurrence=recurrence;newCard.nextDue=todayStr()}
    if(claudeContext)newCard.claudeContext=claudeContext;
    data.cards.push(newCard);
  }
  save();closeModal();render();
}

function deleteCard(){
  if(!confirm('Supprimer cette carte ?'))return;
  const id=+document.getElementById('fId').value;
  data.cards=data.cards.filter(c=>c.id!==id);
  save();closeModal();render();
}

function reorderCard(card,groupId,beforeCardId){
  // Group = all cards with this status, optionally filtered by current category tab
  let group;
  const tab=TABS.find(t=>t.id===currentTab);
  if(tab){
    const tabCats=tab.cats;
    group=data.cards.filter(c=>c.status===groupId&&getCats(c).some(cat=>tabCats.includes(cat)));
  } else {
    // 'all' or 'urgent' tab — order across all matching cards
    group=data.cards.filter(c=>c.status===groupId);
  }

  // Remove card from group
  group=group.filter(c=>c.id!==card.id);

  // Insert at new position
  if(beforeCardId!==null){
    const idx=group.findIndex(c=>c.id===beforeCardId);
    if(idx>=0) group.splice(idx,0,card);
    else group.push(card);
  } else {
    group.push(card);
  }

  // Assign sortOrder based on position
  group.forEach((c,i)=>c.sortOrder=i);
  touch(card);
  save();render();
}

// Custom drag & drop
let isDragging=false,dragEl=null,ghost=null,placeholder=null,ghostOffX=0,ghostOffY=0,hasMoved=false;

function startDrag(e,card,el,touchHeld){
  if(e.button&&e.button!==0)return;
  const ev=e.touches?e.touches[0]:e;
  const sx=ev.clientX,sy=ev.clientY;
  dragCard=card;dragEl=el;hasMoved=false;
  const threshold=touchHeld?0:5;

  function onMove(e2){
    const ev2=e2.touches?e2.touches[0]:e2;
    if(!hasMoved){
      if(Math.abs(ev2.clientX-sx)<threshold&&Math.abs(ev2.clientY-sy)<threshold)return;
      hasMoved=true;isDragging=true;
      const rect=el.getBoundingClientRect();
      ghostOffX=sx-rect.left;ghostOffY=sy-rect.top;
      ghost=el.cloneNode(true);
      ghost.className='card card-ghost';
      ghost.style.width=rect.width+'px';
      document.body.appendChild(ghost);
      placeholder=document.createElement('div');
      placeholder.className='drop-placeholder';
      placeholder.style.height=rect.height+'px';
      el.style.display='none';
      el.parentNode.insertBefore(placeholder,el);
    }
    ghost.style.left=(ev2.clientX-ghostOffX)+'px';
    ghost.style.top=(ev2.clientY-ghostOffY)+'px';
    movePlaceholder(ev2.clientX,ev2.clientY);
    if(e2.cancelable)e2.preventDefault();
  }
  function onEnd(){
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onEnd);
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('touchend',onEnd);
    if(!hasMoved){dragCard=null;dragEl=null;return;}
    let gid=null;
    // Capture drop position before cleanup
    let neighborId=null;
    if(placeholder&&placeholder.parentNode){
      gid=placeholder.parentNode.dataset.group;
      const next=placeholder.nextElementSibling;
      if(next&&next.dataset.id) neighborId=+next.dataset.id;
    }
    const cardRef=dragCard;
    // Clean up visuals
    clearPushClasses();
    document.querySelectorAll('.col-cards.dragging-over').forEach(c=>c.classList.remove('dragging-over'));
    if(ghost)ghost.remove();if(placeholder)placeholder.remove();
    if(dragEl)dragEl.style.display='';
    ghost=null;placeholder=null;dragEl=null;dragCard=null;isDragging=false;
    setTimeout(()=>{hasMoved=false},0);
    if(!gid||!cardRef)return;

    // Reorder within urgent column
    if(gid==='urgent'){
      const urgents=data.cards.filter(c=>c.urgent&&c.status!=='fait');
      const others=urgents.filter(c=>c.id!==cardRef.id);
      if(neighborId!==null){
        const idx=others.findIndex(c=>c.id===neighborId);
        if(idx>=0) others.splice(idx,0,cardRef);
        else others.push(cardRef);
      } else others.push(cardRef);
      others.forEach((c,i)=>c.urgentOrder=i);
      if(!cardRef.urgent){cardRef.urgent=true;}
      save();render();return;
    }

    // If dropping into "fait", confirm first
    if(gid==='fait'){
      showConfirm('Marquer "'+cardRef.title+'" comme fait ?',()=>{
        cardRef.status='fait';cardRef.urgent=false;cardRef.done=true;cardRef.doneAt=Date.now();
        delete cardRef.snoozeUntil;touch(cardRef);
        save();render();
      },()=>{render()});
      return;
    }

    // ALL view — columns are categories; dropping changes the card's category
    if(currentTab==='all'){
      const cats=getCats(cardRef);
      // Same column already (matching tab) = reorder
      const tab=TABS.find(t=>t.id===gid);
      if(tab && cats.some(c=>tab.cats.includes(c))){
        reorderCard(cardRef,gid,neighborId);
      } else if(gid==='urgent'){
        cardRef.urgent=true;
        touch(cardRef);
        save();render();
      } else if(tab){
        cardRef.categories=[tab.cats[0]];
        delete cardRef.category;
        touch(cardRef);
        save();render();
      }
      return;
    }

    // Same status = reorder, different = change status
    if(cardRef.status===gid){
      reorderCard(cardRef,gid,neighborId);
    } else if(gid==='a-surveiller'){
      // Snooze obligatoire : demander la date de reveil
      showSnoozePrompt(cardRef,date=>{
        cardRef.status='a-surveiller';cardRef.snoozeUntil=date;touch(cardRef);
        save();render();
      },()=>render());
    } else {
      cardRef.status=gid;
      delete cardRef.snoozeUntil;
      touch(cardRef);
      save();render();
    }
  }
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onEnd);
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onEnd);
}

function clearPushClasses(){document.querySelectorAll('.card.push-up,.card.push-down').forEach(c=>{c.classList.remove('push-up','push-down')})}
function movePlaceholder(x,y){
  if(!placeholder)return;
  let best=null,bestDist=Infinity;
  document.querySelectorAll('.col-cards[data-group]').forEach(col=>{
    const r=col.getBoundingClientRect();
    const cx=r.left+r.width/2;
    const d=Math.abs(x-cx);
    if(d<bestDist){bestDist=d;best=col;}
  });
  if(!best)return;
  // Mark active drop column
  document.querySelectorAll('.col-cards.dragging-over').forEach(c=>c.classList.remove('dragging-over'));
  best.classList.add('dragging-over');
  const cards=[...best.querySelectorAll('.card')];
  let before=null;
  for(const c of cards){
    const r=c.getBoundingClientRect();
    if(y<r.top+r.height/2){before=c;break;}
  }
  if(before)best.insertBefore(placeholder,before);
  else best.appendChild(placeholder);
  // Magnetic repel — push neighbors away from placeholder
  clearPushClasses();
  const phRect=placeholder.getBoundingClientRect();
  const prev=placeholder.previousElementSibling;
  const next=placeholder.nextElementSibling;
  if(prev&&prev.classList.contains('card'))prev.classList.add('push-up');
  if(next&&next.classList.contains('card'))next.classList.add('push-down');
}

document.addEventListener('click',e=>{if(hasMoved){e.stopPropagation();e.preventDefault()}},true);

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

// Auto-resize textarea
const descEl=document.getElementById('fDesc');
function autoResize(){descEl.style.height='auto';descEl.style.height=descEl.scrollHeight+'px'}
descEl.addEventListener('input',autoResize);

// Toggle recurrence fields when Routine checkbox changes
document.querySelectorAll('#fCats input').forEach(cb=>cb.addEventListener('change',showRecurrenceIfRoutine));

load().then(()=>{render();setAppDate();});

let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => render(), 150);
});
</script>
